openapi: 3.1.0
info:
  title: Todica Internal API
  description: |
    Todica の本人運用サーバとそのクライアント（Web / Android サーバモード）の間の内部 API.
    共有 SaaS としての外部公開 API ではない（project.md §8 Out of Scope 遵守）.

    本ファイルは骨格定義. 共通のプロトコル要素（認証 / 冪等性キー / 楽観ロック / 共通エラー）は
    アーキテクチャ段階で確定済み. 個別エンドポイントのリクエスト / レスポンススキーマは
    各 feature spec の進行に合わせて追記する（仕様策定方針: ADR-0010）.
  version: 0.1.0
  contact:
    name: Todica Owner
servers:
  - url: https://example.invalid/api/v1
    description: 本人運用サーバ（実 URL は運用時に確定）

security:
  - BearerAuth: []

tags:
  - name: tasks
    description: タスク（FR-001 〜 FR-009, FR-014, FR-061）
  - name: today
    description: 今日ビュー（FR-010 〜 FR-013）
  - name: focus
    description: 現在のタスク参照（FR-012, FR-013）
  - name: projects
    description: プロジェクト（FR-020, FR-022, FR-060, FR-061）
  - name: routines
    description: ルーティン（FR-030, FR-031, FR-035）
  - name: trash
    description: ゴミ箱（FR-061, FR-062）
  - name: counter
    description: 今日の完了数（FR-040）
  - name: settings
    description: 設定（FR-042）
  - name: authentication
    description: ログインパスワードとセッション
  - name: reset
    description: リセット処理（FR-043, NFR-020, 保守用）

paths:
  # ========== Tasks ==========
  /tasks:
    summary: タスク一覧 / 起票
    get:
      tags: [tasks]
      summary: タスク一覧取得（BL-001 / FR-001）
      description: |
        ゴミ箱状態の絞り込みはクエリパラメータ `trashed` で指定する.
        並び順はサーバ側で「priority (highest→normal→later) → createdAt 昇順 → id 昇順」
        に統一されている（BL-005 / plan.md D-003: 今日ビュー API と並び規則を共通化）.
      parameters:
        - name: trashed
          in: query
          required: false
          schema:
            type: string
            enum: ["true", "false", "all"]
            default: "false"
          description: |
            `true` = ゴミ箱状態のみ. `false` = ゴミ箱外のみ (既定). `all` = すべて.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [tasks]
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [tasks]
      summary: タスク起票（FR-001 / FR-002 / NFR-020）
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [task]
                properties:
                  task:
                    $ref: "#/components/schemas/Task"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /tasks/{id}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    patch:
      tags: [tasks]
      summary: タスク編集（名称・期限・プロジェクト. FR-005 / FR-009）
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskPatch"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [task]
                properties:
                  task:
                    $ref: "#/components/schemas/Task"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
    delete:
      tags: [tasks]
      summary: タスク削除（ゴミ箱へ. FR-007）
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "204": { description: No Content }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }

  /tasks/{id}/complete:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    post:
      tags: [tasks]
      summary: タスク完了（FR-006 / FR-060）
      description: |
        対象タスクを完了状態（`trashedAt != null`, `trashedReason = "completed"`）に遷移させる.
        既にゴミ箱状態（`trashedReason` が `"completed"` / `"deleted"` のいずれか）の場合は
        no-op 冪等扱いで 200 OK + 現行 task を返す（If-Match 検証もスキップする. BL-003 plan.md §D-003）.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [task]
                properties:
                  task:
                    $ref: "#/components/schemas/Task"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }

  /tasks/{id}/restore:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    post:
      tags: [tasks]
      summary: ゴミ箱からのタスク復元（FR-061）
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200": { description: OK }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }

  # ========== Today ==========
  /today:
    summary: 今日ビュー
    description: |
      期限=今日のタスク一覧（並び順込み）+ "次の 1 つ" を一括返却（FR-010 / FR-011 / NFR-013）.
      並び順はサーバ側で priority (highest→normal→later) → createdAt 昇順 → id 昇順 に確定する.
      クエリパラメータは存在しない（NFR-001 / spec.md §「並び順を変えるカスタマイズが存在しないこと」）.
    get:
      tags: [today]
      summary: 今日ビューを取得（FR-010 / FR-011）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayView"
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ========== Focus ==========
  /focus:
    summary: 現在のタスク参照 (FocusSelection. singleton)
    get:
      tags: [focus]
      summary: 現在のタスクを取得（FR-012）
      description: |
        FocusSelection を返す. 未存在ならデフォルト `{ currentTaskId: null, version: 1, ... }`
        を生成して返す.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [focus]
                properties:
                  focus: { $ref: "#/components/schemas/FocusSelection" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    put:
      tags: [focus]
      summary: 現在のタスクを設定 / 解除（FR-012, FR-013）
      description: |
        body `{ taskId }` で現在のタスクを設定. `taskId: null` で解除.
        対象タスクが存在しない / ゴミ箱中 / dueDate=tomorrow の場合は 400 INVALID_FOCUS_TARGET.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [taskId]
              properties:
                taskId:
                  type: string
                  nullable: true
                  description: 設定するタスク ID. null で解除.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [focus]
                properties:
                  focus: { $ref: "#/components/schemas/FocusSelection" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }

  # ========== Projects ==========
  /projects:
    get:
      tags: [projects]
      summary: プロジェクト一覧
      responses:
        "200": { description: OK }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [projects]
      summary: プロジェクト作成
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "201": { description: Created }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /projects/{id}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    patch:
      tags: [projects]
      summary: プロジェクト編集（FR-022）
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200": { description: OK }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
    delete:
      tags: [projects]
      summary: プロジェクト削除（ゴミ箱へ）
      description: |
        配下 Task の扱いはクエリパラメータ `cascade` で指定する.
        UI がユーザーに確認した結果をそのまま送る（カスケード or 独立化）.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
        - name: cascade
          in: query
          required: true
          schema:
            type: string
            enum: ["true", "false"]
          description: |
            `true` = 配下 Task もゴミ箱化. `false` = 配下 Task の `projectId` を `null` にする.
      responses:
        "204": { description: No Content }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }

  /projects/{id}/restore:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    post:
      tags: [projects]
      summary: プロジェクト復元
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200": { description: OK }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }

  # ========== Routines ==========
  /routines:
    get:
      tags: [routines]
      summary: ルーティン一覧
      responses:
        "200": { description: OK }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [routines]
      summary: ルーティン作成
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "201": { description: Created }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /routines/{id}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    patch:
      tags: [routines]
      summary: ルーティン編集（FR-035）
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200": { description: OK }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
    delete:
      tags: [routines]
      summary: ルーティン削除（ゴミ箱へ）
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "204": { description: No Content }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }

  /routines/{id}/restore:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    post:
      tags: [routines]
      summary: ルーティン復元（FR-061）
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200": { description: OK }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }

  # ========== Trash ==========
  /trash:
    summary: ゴミ箱一覧 / 手動空にする
    get:
      tags: [trash]
      summary: ゴミ箱一覧
      responses:
        "200": { description: OK }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      tags: [trash]
      summary: ゴミ箱を空にする（FR-062）
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204": { description: No Content }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ========== Counter ==========
  /counter:
    summary: 今日の完了数（FR-040）
    get:
      tags: [counter]
      summary: 今日の完了タスク数を取得
      description: |
        Counter (singleton) を返す. 未存在ならデフォルト
        `{ completedCount: 0, lastResetExecutedAt: null, version: 1, ... }` を生成して返す.
        日次リセットでカウントがクリアされる (BL-010 担当).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [counter]
                properties:
                  counter: { $ref: "#/components/schemas/Counter" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ========== Settings ==========
  /settings:
    summary: 設定（FR-042）
    get:
      summary: Settings を取得する
      tags: [settings]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [settings]
                properties:
                  settings:
                    $ref: "#/components/schemas/Settings"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      summary: Settings を更新する (dayBoundaryTime)
      tags: [settings]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dayBoundaryTime]
              properties:
                dayBoundaryTime:
                  type: string
                  example: "06:00"
      responses:
        "200":
          description: 更新後の Settings
          content:
            application/json:
              schema:
                type: object
                required: [settings]
                properties:
                  settings:
                    $ref: "#/components/schemas/Settings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "412":
          description: Precondition Failed (version 不一致)
          content:
            application/json:
              schema:
                type: object
                required: [settings]
                properties:
                  settings:
                    $ref: "#/components/schemas/Settings"

  # ========== Authentication ==========
  /auth-state:
    summary: パスワード初期化状態
    get:
      tags: [authentication]
      summary: 初期パスワードが設定済みか取得する
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [initialized]
                properties:
                  initialized:
                    type: boolean
        "500": { $ref: "#/components/responses/InternalServerError" }

  /login:
    summary: ログイン
    post:
      tags: [authentication]
      summary: パスワードを検証してセッショントークンを発行する
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "412":
          description: 初期パスワード設定が必要
        "500": { $ref: "#/components/responses/InternalServerError" }

  /password:
    summary: 初期パスワード設定 / ログインパスワード変更
    post:
      tags: [authentication]
      summary: DB 状態に応じて初期設定またはパスワード変更を行う
      security:
        - {}
        - BearerAuth: []
      description: |
        DB が空なら認証と currentPassword は不要で、保存後に自動ログイン token を返す。
        設定済みなら Bearer 認証と currentPassword が必要で、成功時に既存セッションを削除する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword]
              properties:
                currentPassword:
                  type: string
                  minLength: 1
                newPassword:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: 初期設定時は token を返し、通常変更時は空オブジェクトを返す
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AuthToken"
                  - type: object
                    additionalProperties: false
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  # ========== Reset ==========
  /reset:
    summary: リセット処理の手動起動（保守用）
    post:
      tags: [reset]
      summary: リセット処理を即時実行（NFR-020 冪等性）
      description: |
        冪等. 同じ境界時刻で既にリセット済みの場合は no-op の 200 OK を返し,
        レスポンスボディに「適用済み境界時刻」を含めてクライアントが再実行か否かを判別できるようにする.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: |
            OK. レスポンスボディに `executed` (boolean) と `appliedBoundaryAt` (ISO 8601) を含む.
            既実行時は `executed = false`, 新規実行時は `executed = true`.
          content:
            application/json:
              schema:
                type: object
                required:
                  - executed
                  - appliedBoundaryAt
                properties:
                  executed:
                    type: boolean
                  appliedBoundaryAt:
                    type: string
                    format: date-time
        "401": { $ref: "#/components/responses/Unauthorized" }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        単一ユーザー前提の最小実装. 詳細は ADR-0010 を参照.

  parameters:
    EntityId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: エンティティ ID（UUID v4. ドメイン層採番）

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
      description: |
        書き込み API 共通の冪等性キー. 値は対象エンティティ ID（UUID v4）を使う.
        サーバは直近一定期間内の同キー要求を no-op で扱い, 保存済み応答を返す.
        詳細: ADR-0010 §「冪等性キーと楽観ロック」.

    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
      description: |
        楽観ロック用. クライアントが保持するエンティティの `version` 整数値を文字列として送る.
        サーバ側の現行 `version` と不一致なら 412 Precondition Failed を返す.
        詳細: ADR-0010 §「冪等性キーと楽観ロック」.

  responses:
    BadRequest:
      description: 入力バリデーション違反
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: 認証エラー（Bearer トークン未提示 / 無効）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: 指定リソースが存在しない
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PreconditionFailed:
      description: |
        楽観ロックの version 不一致. レスポンスボディにサーバ側の現行エンティティを含めるため,
        クライアントは「サーバ値で上書き」or「クライアント値を強制再送」をユーザーに確認する.
        BL-001 では `task` フィールドに現行 Task を返す. 他リソースは feature spec で確定する.
      content:
        application/json:
          schema:
            type: object
            properties:
              task:
                $ref: "#/components/schemas/Task"
    InternalServerError:
      description: サーバ内部エラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    AuthToken:
      type: object
      required: [token, expiresAt]
      properties:
        token:
          type: string
        expiresAt:
          type: integer
          format: int64

    # ---------- Task 関連 (BL-001 で確定) ----------
    Task:
      type: object
      description: |
        タスク. docs/developer/architecture/database/schema.md §Task と一致.
        サブタスク参照は持たない (FR-008: 2 階層固定).
      required:
        - id
        - name
        - projectId
        - dueDate
        - priority
        - origin
        - routineId
        - createdAt
        - updatedAt
        - trashedAt
        - trashedReason
        - version
      properties:
        id:
          type: string
          description: タスク ID (UUID v4. クライアント先行採番)
        name:
          type: string
          description: タスク名 (1〜200 文字, 制御文字を含まない)
        projectId:
          type: string
          nullable: true
          description: 所属プロジェクト ID. null はプロジェクト外タスク
        dueDate:
          type: string
          enum: [today, tomorrow]
        priority:
          type: string
          enum: [highest, normal, later]
        origin:
          type: string
          enum: [manual, routine]
        routineId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        trashedAt:
          type: string
          format: date-time
          nullable: true
        trashedReason:
          type: string
          enum: [completed, deleted]
          nullable: true
        version:
          type: integer
          minimum: 1

    TaskInput:
      type: object
      description: タスク起票時の入力. id はクライアント採番 (Idempotency-Key と一致).
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: タスク ID (UUID v4)
        name:
          type: string
          description: タスク名 (1〜200 文字, 制御文字を含まない)
        projectId:
          type: string
          nullable: true
          description: 所属プロジェクト ID (任意)
        dueDate:
          type: string
          enum: [today, tomorrow]
          default: today
        priority:
          type: string
          enum: [highest, normal, later]
          default: normal

    TodayView:
      type: object
      description: |
        BL-005 / FR-010 / FR-011: 今日ビューのレスポンス形状.
        - tasks: dueDate = "today" かつ trashedAt = null のタスクを
          priority (highest→normal→later) → createdAt 昇順 → id 昇順 で並べた一覧.
        - nextTaskId: 並びの先頭タスクの id. tasks が空のとき null.
          利用者・FocusSelection (BL-006) が「次の 1 つ」として参照する.
        - currentTaskId: BL-006 で追加. FocusSelection.currentTaskId をそのまま同梱
          (UI が 1 リクエストで強調表示できるように. plan.md D-004 の保守側案を更新済).
      required:
        - tasks
        - nextTaskId
        - currentTaskId
        - completionCount
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        nextTaskId:
          type: string
          nullable: true
        currentTaskId:
          type: string
          nullable: true
        completionCount:
          type: integer
          description: BL-008 / FR-040. 今日の完了数 (Counter.completedCount を同梱).

    TaskPatch:
      type: object
      description: タスク編集時の部分入力. 省略フィールドは変更しない.
      properties:
        name:
          type: string
        dueDate:
          type: string
          enum: [today, tomorrow]
        projectId:
          type: string
          nullable: true
        priority:
          type: string
          enum: [highest, normal, later]
          description: BL-002 / FR-004. 値域外は 400 INVALID_PRIORITY を返す.

    # ---------- 他エンティティ (feature spec で詳細化) ----------
    Project:
      type: object
      description: プロジェクト（schema.md と整合. feature spec で詳細化）
    Routine:
      type: object
      description: ルーティン（同上）
    Counter:
      type: object
      description: |
        BL-008 / FR-040: 今日の完了タスク数 (singleton).
        - completedCount: 通常状態 → 完了 に遷移した回数の累計. 日次リセットで 0 にクリア (BL-010).
        - lastResetExecutedAt: 最後にリセットを実行した時刻. BL-010 で使う.
        - version / updatedAt: 楽観ロック + 同期メタデータ.
      required:
        - id
        - completedCount
        - lastResetExecutedAt
        - version
        - updatedAt
      properties:
        id:
          type: string
          example: singleton
        completedCount:
          type: integer
        lastResetExecutedAt:
          type: string
          format: date-time
          nullable: true
        version:
          type: integer
        updatedAt:
          type: string
          format: date-time
    Settings:
      type: object
      description: |
        BL-009 / FR-041: 境界時刻設定 (singleton).
        - dayBoundaryTime: HH:MM 形式 (例: "04:00"). FR-041 / FR-042.
        - version / updatedAt: 楽観ロック + 同期メタデータ.
      required:
        - id
        - dayBoundaryTime
        - version
        - updatedAt
      properties:
        id:
          type: string
          example: singleton
        dayBoundaryTime:
          type: string
          example: "04:00"
        version:
          type: integer
        updatedAt:
          type: string
          format: date-time
    FocusSelection:
      type: object
      description: |
        BL-006 / FR-012: 現在のタスク参照 (singleton).
        - currentTaskId: 明示的に選ばれた「現在のタスク」. null なら UI 側で nextTaskId を暗黙フォールバック.
        - version / updatedAt: 楽観ロック + 同期メタデータ.
      required:
        - currentTaskId
        - version
        - updatedAt
      properties:
        currentTaskId:
          type: string
          nullable: true
        version:
          type: integer
        updatedAt:
          type: string
          format: date-time

    # ---------- 共通エラー ----------
    ErrorCode:
      type: string
      description: |
        共通エラーコード. BL-001 では以下を使う.
        他 feature が追加する場合は本 enum に追記する.
      enum:
        - INVALID_REQUEST_BODY
        - INVALID_TASK_NAME
        - INVALID_DUE_DATE
        - INVALID_PRIORITY
        - INVALID_FOCUS_TARGET
        - PROJECT_NOT_FOUND
        - TASK_NOT_FOUND
        - MISSING_IF_MATCH
        - MISSING_IDEMPOTENCY_KEY
        - UNAUTHORIZED
        - INVALID_DAY_BOUNDARY_TIME
    Error:
      type: object
      description: |
        共通エラーレスポンス. `code` は ErrorCode の値域に従う.
      required:
        - code
        - message
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
