# シークレットスキャン: gitleaks で git 全履歴を走査し, 秘密情報の混入を検出する.
# ルール設定は .gitleaks.toml, 既知の誤検出は .gitleaksignore で管理する.
name: secret-scan

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          # 全履歴を走査するため shallow clone を無効化する.
          fetch-depth: 0
      - name: install gitleaks
        run: |
          GL_VERSION=8.30.1
          curl -sSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz"
          tar xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks version
      - name: run gitleaks
        run: /tmp/gitleaks git . --config .gitleaks.toml --redact --no-banner
