# CI ゲート: typecheck / lint / vitest / playwright を 4 job 並列で実行する.
# Pull Request と main への push をトリガとし, 同一 ref の古い実行はキャンセルする.
# @todica/domain の exports は domain/dist/ を指すため, クリーンチェックアウトでは
# typecheck / vitest / playwright の各 job で npm ci 直後に domain の build が必要
# (lint は Biome がソーステキストのみを検査するため build 不要).
name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: install dependencies
        run: npm ci
      - name: build domain
        run: npm run build -w domain
      - name: run typecheck
        run: npm run typecheck

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: install dependencies
        run: npm ci
      - name: run lint
        run: npm run lint

  vitest:
    name: vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: install dependencies
        run: npm ci
      - name: build domain
        run: npm run build -w domain
      - name: run vitest
        run: npx vitest run

  playwright:
    name: playwright
    runs-on: ubuntu-latest
    # playwright job green 前提の正常運用 (retries 発動が少数) に十分な余裕値.
    # 大量の spec 失敗 × retries (CI: 2 回) が積み上がる状態では 30 分でも
    # cancel され得る (cancel 時は if: failure() の report upload も実行されない).
    timeout-minutes: 30
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: install dependencies
        run: npm ci
      - name: build domain
        run: npm run build -w domain
      - name: cache playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: install playwright browsers
        run: npx playwright install --with-deps chromium
      - name: run playwright tests
        run: npx playwright test
      - name: upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
